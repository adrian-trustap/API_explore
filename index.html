<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>API Tree Viewer with Highlight Toggle</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
    }
    #controls {
      padding: 10px;
      background: #f8f8f8;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .node circle {
      fill: #555;
    }
    .node text {
      font-size: 12px;
    }
    .link {
      fill: none;
      stroke: #999;
      stroke-opacity: 0.6;
      stroke-width: 1.5px;
    }
  </style>
</head>
<body>
  <div id="controls"></div>
<svg width="100%" height="100%"></svg>

<script>
  const highlightTerms = ["transactions", "create", "claim", "complain", "cancel", "accept","charge", "bank_transfer"];
  const color = d3.scaleOrdinal().domain(highlightTerms).range(d3.schemeCategory10);
  let activeTerms = new Set(highlightTerms);
  let collapseToList = false;
  let root, allData = {}; // store both before/after trees
  let currentView = "before"; // default

  const svg = d3.select("svg");
  const g = svg.append("g");

  const zoom = d3.zoom().on("zoom", (event) => {
    g.attr("transform", event.transform);
  });
  svg.call(zoom);

  function renderControls() {
    const controls = d3.select("#controls");

    // highlight checkboxes
    controls.append("div")
      .selectAll("label")
      .data(highlightTerms)
      .join("label")
      .style("margin-right", "10px")
      .html(term => `
        <input type="checkbox" value="${term}" checked> 
        <span style="color:${color(term)}">${term}</span>
      `)
      .on("change", function(event, term) {
        const checked = d3.select(this).select("input").property("checked");
        if (checked) activeTerms.add(term);
        else activeTerms.delete(term);
        updateHighlights();
      });

    // collapse toggle
    controls.append("label")
      .style("margin-left", "20px")
      .html(`<input type="checkbox" id="collapseToggle"> Collapse to list`)
      .on("change", function() {
        collapseToList = d3.select("#collapseToggle").property("checked");
        render();
      });

    // before/after toggle
    controls.append("label")
      .style("margin-left", "20px")
      .html(`
        <select id="viewToggle">
          <option value="before">Before</option>
          <option value="after">After</option>
        </select>
      `)
      .on("change", function() {
        currentView = d3.select("#viewToggle").property("value");
        root = d3.hierarchy(allData[currentView]);
        render();
      });
  }

  function highlightColor(name) {
    const isEndpoint = name.includes("[") && name.includes("]");
    if (!isEndpoint) return null;
    for (let term of activeTerms) {
      if (name.toLowerCase().includes(term.toLowerCase())) {
        return color(term);
      }
    }
    return null;
  }

  function render() {
  if (!root) return;

  const dx = 20, dy = 200;
  const tree = d3.tree().nodeSize([dx, dy]);
  const diagonal = d3.linkHorizontal().x(d => d.y).y(d => d.x);

  const treeData = tree(root);
  const nodes = treeData.descendants();
  const links = treeData.links();

  const height = Math.max(500, nodes.length * dx * 1.5);
  svg.attr("viewBox", [-dy / 3, -dx, window.innerWidth, height]);

  // ---- LINKS ----
  const link = g.selectAll("path.link")
    .data(links, d => d.target.data.name); // key by target name

  link.join(
    enter => enter.append("path")
      .attr("class", "link")
      .attr("d", diagonal)
      .attr("stroke-opacity", 0)
      .transition().duration(750)
      .attr("stroke-opacity", 0.6),
    update => update.transition().duration(750).attr("d", diagonal),
    exit => exit.transition().duration(750).attr("stroke-opacity", 0).remove()
  );

  // ---- NODES ----
  const node = g.selectAll("g.node")
    .data(nodes, d => d.data.name); // key by node name

  const nodeEnter = node.enter().append("g")
    .attr("class", "node")
    .attr("transform", d => `translate(${d.y},${d.x})`)
    .attr("opacity", 0);

  nodeEnter.append("circle").attr("r", 4);
  nodeEnter.append("text")
    .attr("dy", "0.31em")
    .attr("x", d => d.children ? -8 : 8)
    .attr("text-anchor", d => d.children ? "end" : "start")
    .text(d => d.data.name)
    .attr("fill", d => highlightColor(d.data.name) || "black")
    .clone(true).lower().attr("stroke", "white");

  nodeEnter.transition().duration(750).attr("opacity", 1);

  node.transition().duration(750)
    .attr("transform", d => `translate(${d.y},${d.x})`);

  node.exit().transition().duration(750).attr("opacity", 0).remove();

  window.nodeText = g.selectAll("g.node text");
}


  function updateHighlights() {
    if (!window.nodeText) return;
    window.nodeText.attr("fill", d => highlightColor(d.data.name) || "black");
  }

  // Load both before and after JSONs
  Promise.all([
    d3.json("tree_before.json"),
    d3.json("tree_after.json")
  ]).then(([beforeData, afterData]) => {
    allData.before = beforeData;
    allData.after = afterData;
    root = d3.hierarchy(allData.before); // default view
    renderControls();
    render();
  });
</script>
</body>
</html>
