<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>API Tree Viewer - Split</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    html, body {
      font-family: sans-serif;
      margin: 0;
      height: 100%;
    }
    #controls {
      padding: 10px 14px;
      background: #f8f8f8;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    #controls .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    #controls .swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }
    #controls .title {
      font-weight: 600;
      color: #444;
    }
    #panes {
      display: flex;
      height: calc(100vh - 45px);
    }
    .pane {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .pane svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .pane-title {
      position: absolute;
      top: 8px;
      left: 12px;
      font-weight: 600;
      color: #444;
      background: rgba(255, 255, 255, 0.85);
      padding: 2px 10px;
      border-radius: 4px;
      z-index: 5;
      font-size: 13px;
    }
    .pane-divider {
      width: 1px;
      background: #ddd;
    }
    .node text {
      font-size: 12px;
    }
    .link {
      fill: none;
      stroke: #999;
      stroke-opacity: 0.6;
      stroke-width: 1.5px;
    }
  </style>
</head>
<body>
  <div id="controls"></div>
  <div id="panes">
    <div class="pane" id="pane-v1">
      <div class="pane-title">v1</div>
      <svg id="svg-v1"></svg>
    </div>
    <div class="pane-divider"></div>
    <div class="pane" id="pane-v2">
      <div class="pane-title">v2</div>
      <svg id="svg-v2"></svg>
    </div>
  </div>

  <script>
    // Same color scheme as the merged viewer.
    const statusColors = {
      added: "#2ca02c",
      removed: "#d62728",
      modified: "#e6a817"
    };
    const toggleableStatuses = ["added", "modified", "removed"];
    let activeStatuses = new Set(toggleableStatuses);

    function statusColor(status) {
      if (!status || !statusColors[status]) return null;
      return activeStatuses.has(status) ? statusColors[status] : null;
    }

    function renderControls() {
      const controls = d3.select("#controls");
      controls.selectAll("*").remove();
      controls.append("span").attr("class", "title").text("Diff:");
      controls.selectAll(".legend-item")
        .data(toggleableStatuses)
        .join("label")
        .attr("class", "legend-item")
        .html(status => `
          <input type="checkbox" value="${status}" checked>
          <span class="swatch" style="background:${statusColors[status]}"></span>
          <span>${status}</span>
        `)
        .on("change", function (event, status) {
          const checked = d3.select(this).select("input").property("checked");
          if (checked) activeStatuses.add(status);
          else activeStatuses.delete(status);
          updateColors();
        });
      controls.append("span")
        .style("color", "#666")
        .style("font-size", "12px")
        .text("(left = v1 only, right = v2 only; amber = endpoint exists in both but its methods changed)");
    }

    // --- Split the merged tree into a v1-only and a v2-only tree ---------
    // `side` is "v1" or "v2". A method is kept on a side unless it was
    // exclusively added (skip on v1) or exclusively removed (skip on v2).
    // A node that had methods in the merged tree but none survive the
    // filter (and has no surviving children) didn't exist on that side at
    // all, so it's dropped entirely.
    function pruneForSide(node, side, isRoot) {
      const hadMethods = !!(node.methods && node.methods.length);
      const methods = hadMethods
        ? node.methods.filter(m => side === "v1" ? m.status !== "added" : m.status !== "removed")
        : null;

      const originalChildren = node.children || [];
      const children = originalChildren
        .map(c => pruneForSide(c, side, false))
        .filter(Boolean);

      const hasMethods = methods && methods.length > 0;

      if (!isRoot && hadMethods && !hasMethods && children.length === 0) {
        return null; // endpoint didn't exist on this side
      }
      if (!isRoot && !hadMethods && originalChildren.length > 0 && children.length === 0) {
        return null; // folder whose entire contents were exclusive to the other side
      }

      const result = { name: node.name };
      if (hasMethods) {
        result.methods = methods;
        result.status = node.status; // keep for coloring (added/removed/modified/unchanged)
      }
      if (children.length) result.children = children;
      return result;
    }

    function renderNodeLabel(textSelection, d) {
      const data = d.data;
      const nodeStatus = data.status || null;

      textSelection.append("tspan")
        .attr("data-node-status", nodeStatus || "")
        .attr("fill", statusColor(nodeStatus) || "black")
        .text(data.name);

      if (data.methods && data.methods.length) {
        textSelection.append("tspan").text(" [");
        data.methods.forEach((m, i) => {
          textSelection.append("tspan")
            .attr("data-method-status", m.status)
            .attr("fill", statusColor(m.status) || "#333")
            .style("text-decoration", m.status === "removed" ? "line-through" : null)
            .text((i > 0 ? ", " : "") + m.method);
        });
        textSelection.append("tspan").text("]");
      }
    }

    function nodeCircleColor(d) {
      return statusColor(d.data.status) || "#555";
    }

    const paneNodeSelections = {};

    function renderPane(svgId, data) {
      const svg = d3.select(svgId);
      const g = svg.append("g");
      const zoom = d3.zoom().on("zoom", (event) => {
        g.attr("transform", event.transform);
      });
      svg.call(zoom);

      const root = d3.hierarchy(data);
      const dx = 20;
      const dy = 220;
      const tree = d3.tree().nodeSize([dx, dy]);
      const diagonal = d3.linkHorizontal()
        .x(d => d.y)
        .y(d => d.x);

      const treeData = tree(root);
      const nodes = treeData.descendants();
      const links = treeData.links();

      const height = Math.max(500, nodes.length * dx * 1.5);
      svg.attr("viewBox", [-dy / 3, -dx, 700, height]);

      g.append("g")
        .selectAll("path")
        .data(links)
        .join("path")
        .attr("class", "link")
        .attr("d", diagonal);

      const node = g.append("g")
        .selectAll("g")
        .data(nodes)
        .join("g")
        .attr("class", "node")
        .attr("transform", d => `translate(${d.y},${d.x})`);

      node.append("circle")
        .attr("r", 4)
        .attr("fill", nodeCircleColor);

      const text = node.append("text")
        .attr("dy", "0.31em")
        .attr("x", d => d.children ? -8 : 8)
        .attr("text-anchor", d => d.children ? "end" : "start");

      text.each(function (d) {
        renderNodeLabel(d3.select(this), d);
      });

      text.clone(true)
        .lower()
        .attr("stroke", "white")
        .attr("stroke-width", 3);

      return node;
    }

    d3.json("tree.json").then(data => {
      const diffMode = d3.hierarchy(data).descendants().some(d => d.data.status);
      renderControls();
      if (!diffMode) {
        d3.select("#controls").append("span")
          .style("color", "#b00")
          .text(" tree.json has no diff data - generate it with `python api_tree.py v1.yaml --compare v2.yaml` to use this split view.");
      }

      const v1Data = pruneForSide(data, "v1", true);
      const v2Data = pruneForSide(data, "v2", true);

      paneNodeSelections.v1 = renderPane("#svg-v1", v1Data);
      paneNodeSelections.v2 = renderPane("#svg-v2", v2Data);
    });

    function updateColors() {
      Object.values(paneNodeSelections).forEach(node => {
        if (!node) return;
        node.select("circle").attr("fill", nodeCircleColor);
        node.selectAll("text").each(function (d) {
          d3.select(this).selectAll("tspan[data-node-status]")
            .attr("fill", () => statusColor(d.data.status || null) || "black");
          d3.select(this).selectAll("tspan[data-method-status]").each(function () {
            const status = d3.select(this).attr("data-method-status");
            d3.select(this).attr("fill", statusColor(status) || "#333");
          });
        });
      });
    }
  </script>
</body>
</html>
