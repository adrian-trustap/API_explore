<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>API Tree Viewer</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
    }
    #controls {
      padding: 10px 14px;
      background: #f8f8f8;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    #controls .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    #controls .swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }
    #controls .title {
      font-weight: 600;
      color: #444;
    }
    .node circle {
      fill: #555;
    }
    .node text {
      font-size: 12px;
    }
    .link {
      fill: none;
      stroke: #999;
      stroke-opacity: 0.6;
      stroke-width: 1.5px;
    }
  </style>
</head>
<body>
  <div id="controls"></div>
  <svg width="100%" height="100%"></svg>
  <script>
    // Colors for diff statuses. "unchanged" intentionally has no highlight color -
    // it just renders as normal text/circles.
    const statusColors = {
      added: "#2ca02c",
      removed: "#d62728",
      modified: "#e6a817"
    };
    const toggleableStatuses = ["added", "modified", "removed"];
    let activeStatuses = new Set(toggleableStatuses);
    let diffMode = false;

    function statusColor(status) {
      if (!status || !statusColors[status]) return null;
      return activeStatuses.has(status) ? statusColors[status] : null;
    }

    function renderControls() {
      const controls = d3.select("#controls");
      controls.selectAll("*").remove();

      if (!diffMode) {
        controls.append("span").attr("class", "title").text("Endpoints");
        return;
      }

      controls.append("span").attr("class", "title").text("Diff:");
      controls.selectAll(".legend-item")
        .data(toggleableStatuses)
        .join("label")
        .attr("class", "legend-item")
        .html(status => `
          <input type="checkbox" value="${status}" checked>
          <span class="swatch" style="background:${statusColors[status]}"></span>
          <span>${status}</span>
        `)
        .on("change", function (event, status) {
          const checked = d3.select(this).select("input").property("checked");
          if (checked) activeStatuses.add(status);
          else activeStatuses.delete(status);
          updateColors();
        });

      controls.append("span")
        .style("color", "#666")
        .style("font-size", "12px")
        .text("(unchanged endpoints are shown in black)");
    }

    // Builds the label for a node: the path segment, plus "[METHOD, METHOD]" if
    // it's an endpoint. Each method gets its own <tspan> so it can be colored
    // and struck-through independently.
    function renderNodeLabel(textSelection, d) {
      const data = d.data;
      const nodeStatus = data.status || null;

      textSelection.append("tspan")
        .attr("data-node-status", nodeStatus || "")
        .attr("fill", statusColor(nodeStatus) || "black")
        .text(data.name);

      if (data.methods && data.methods.length) {
        textSelection.append("tspan").text(" [");
        data.methods.forEach((m, i) => {
          textSelection.append("tspan")
            .attr("data-method-status", m.status)
            .attr("fill", statusColor(m.status) || "#333")
            .style("text-decoration", m.status === "removed" ? "line-through" : null)
            .text((i > 0 ? ", " : "") + m.method);
        });
        textSelection.append("tspan").text("]");
      }
    }

    function nodeCircleColor(d) {
      return statusColor(d.data.status) || "#555";
    }

    const svg = d3.select("svg");
    const g = svg.append("g");
    const zoom = d3.zoom().on("zoom", (event) => {
      g.attr("transform", event.transform);
    });
    svg.call(zoom);

    d3.json("tree.json").then(data => {
      const root = d3.hierarchy(data);
      diffMode = root.descendants().some(d => d.data.status);
      renderControls();

      const dx = 20;
      const dy = 260;
      const tree = d3.tree().nodeSize([dx, dy]);
      const diagonal = d3.linkHorizontal()
        .x(d => d.y)
        .y(d => d.x);

      const treeData = tree(root);
      const nodes = treeData.descendants();
      const links = treeData.links();

      const height = Math.max(500, nodes.length * dx * 1.5);
      svg.attr("viewBox", [-dy / 3, -dx, window.innerWidth, height]);

      g.append("g")
        .selectAll("path")
        .data(links)
        .join("path")
        .attr("class", "link")
        .attr("d", diagonal);

      const node = g.append("g")
        .selectAll("g")
        .data(nodes)
        .join("g")
        .attr("class", "node")
        .attr("transform", d => `translate(${d.y},${d.x})`);

      node.append("circle")
        .attr("r", 4)
        .attr("fill", nodeCircleColor);

      const text = node.append("text")
        .attr("dy", "0.31em")
        .attr("x", d => d.children ? -8 : 8)
        .attr("text-anchor", d => d.children ? "end" : "start");

      text.each(function (d) {
        renderNodeLabel(d3.select(this), d);
      });

      // White halo behind the text so it stays readable over links.
      text.clone(true)
        .lower()
        .attr("stroke", "white")
        .attr("stroke-width", 3);

      window.allNodes = node;
    });

    function updateColors() {
      if (!window.allNodes) return;
      window.allNodes.select("circle").attr("fill", nodeCircleColor);
      window.allNodes.selectAll("text").each(function (d) {
        d3.select(this).selectAll("tspan[data-node-status]")
          .attr("fill", () => statusColor(d.data.status || null) || "black");
        d3.select(this).selectAll("tspan[data-method-status]").each(function () {
          const status = d3.select(this).attr("data-method-status");
          d3.select(this).attr("fill", statusColor(status) || "#333");
        });
      });
    }
  </script>
</body>
</html>
